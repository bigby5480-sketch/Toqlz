# Toqlz<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>المدونة</title>
  <script src="firebase.js"></script>
</head>

<body>

<div id="content" style="font-family:Arial; padding:20px;"></div>

<script>
auth.onAuthStateChanged(user => {

  if(!user){
    window.location.href = "login.html";
    return;
  }

  document.getElementById("content").innerHTML = `
    <h1>مرحباً بك في مدونة الجلسات النفسية</h1>
    <p>هذه منصة تهتم بالصحة النفسية والثيرابي.</p>

    <p><b>المستخدم:</b> ${user.email}</p>

    <button onclick="logout()" style="padding:10px;background:red;color:white;border:none;">
      تسجيل خروج
    </button>
  `;
});

function logout(){
  auth.signOut().then(() => {
    window.location.href = "login.html";
  });
}
</script>

</body>
</html>
