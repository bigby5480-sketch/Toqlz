<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>إنشاء حساب</title>
</head>

<body style="font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;">

<div>
  <h2>إنشاء حساب</h2>

  <input id="username" placeholder="اسم المستخدم" style="display:block;margin:5px;padding:10px;width:250px;">
  <input id="password" type="password" placeholder="كلمة المرور" style="display:block;margin:5px;padding:10px;width:250px;">

  <button onclick="register()" style="padding:10px;width:250px;">إنشاء</button>

  <p><a href="login.html">لديك حساب؟ تسجيل دخول</a></p>
</div>

<script>
function register(){
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if(!user || !pass){
    alert("املأ البيانات");
    return;
  }

  // تخزين مؤقت (مؤقت فقط للتجربة)
  localStorage.setItem("user", user);
  localStorage.setItem("pass", pass);

  alert("تم إنشاء الحساب");
  window.location.href = "login.html";
}
</script>

</body>
</html>
