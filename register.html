<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>إنشاء حساب</title>
</head>

<body style="font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;background:#f5f5f5;">

<div style="background:white;padding:25px;border-radius:10px;width:320px;">

  <h2>إنشاء حساب</h2>

  <input id="username" placeholder="اسم المستخدم" style="width:100%;padding:10px;margin:5px 0;">

  <input id="country" placeholder="البلد" style="width:100%;padding:10px;margin:5px 0;">

  <input id="password" type="password" placeholder="كلمة المرور (4 أرقام على الأقل)" style="width:100%;padding:10px;margin:5px 0;">

  <input id="confirm" type="password" placeholder="تأكيد كلمة المرور" style="width:100%;padding:10px;margin:5px 0;">

  <input id="phone" placeholder="رقم الجوال (اختياري)" style="width:100%;padding:10px;margin:5px 0;">

  <button onclick="register()" style="width:100%;padding:10px;background:green;color:white;border:none;">
    إنشاء الحساب
  </button>

  <p style="text-align:center">
    لديك حساب؟ <a href="login.html">تسجيل دخول</a>
  </p>

</div>

<script>
function register(){

  const username = document.getElementById("username").value;
  const country = document.getElementById("country").value;
  const password = document.getElementById("password").value;
  const confirm = document.getElementById("confirm").value;
  const phone = document.getElementById("phone").value;

  // التحقق
  if(!username || !country || !password || !confirm){
    alert("املأ جميع الحقول المطلوبة");
    return;
  }

  if(password.length < 4){
    alert("كلمة المرور يجب أن تكون 4 أرقام أو أكثر");
    return;
  }

  if(password !== confirm){
    alert("كلمة المرور غير متطابقة");
    return;
  }

  // حفظ بيانات مؤقتًا
  const userData = {
    username,
    country,
    password,
    phone
  };

  localStorage.setItem("userData", JSON.stringify(userData));

  alert("تم إنشاء الحساب بنجاح");
  window.location.href = "login.html";
}
</script>

</body>
</html>
