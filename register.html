<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>إنشاء حساب</title>
  <script src="firebase.js"></script>
</head>

<body style="font-family:Arial; background:#f5f5f5; display:flex; justify-content:center; align-items:center; height:100vh;">

<div style="background:white;padding:25px;border-radius:10px;width:300px;">
  <h2>إنشاء حساب</h2>

  <input id="email" placeholder="الإيميل" style="width:100%;padding:10px;margin:5px 0;">
  <input id="password" type="password" placeholder="كلمة المرور" style="width:100%;padding:10px;margin:5px 0;">

  <button onclick="register()" style="width:100%;padding:10px;background:green;color:white;border:none;">
    إنشاء حساب
  </button>

  <p style="text-align:center;">
    لديك حساب؟ <a href="login.html">تسجيل دخول</a>
  </p>
</div>

<script>
function register(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => {
      window.location.href = "home.html";
    })
    .catch(err => alert(err.message));
}
</script>

</body>
</html>
