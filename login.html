<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تسجيل دخول</title>
</head>

<body style="font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;">

<div>
  <h2>تسجيل الدخول</h2>

  <input id="username" placeholder="اسم المستخدم" style="display:block;margin:5px;padding:10px;width:250px;">
  <input id="password" type="password" placeholder="كلمة المرور" style="display:block;margin:5px;padding:10px;width:250px;">

  <button onclick="login()" style="padding:10px;width:250px;">دخول</button>

  <p><a href="register.html">إنشاء حساب</a></p>
</div>

<script>
function login(){
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  const savedUser = localStorage.getItem("user");
  const savedPass = localStorage.getItem("pass");

  if(user === savedUser && pass === savedPass){
    localStorage.setItem("loggedIn", "true");
    window.location.href = "home.html";
  } else {
    alert("بيانات خاطئة");
  }
}
</script>

</body>
</html>
